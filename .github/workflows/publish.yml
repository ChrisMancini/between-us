name: Publish Docker Image

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version needs publishing
        id: should_publish
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "Version v${VERSION} already published"
          else
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "Version v${VERSION} needs publishing"
          fi

      - name: Create GitHub Release
        if: steps.should_publish.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Log in to ghcr.io
        if: steps.should_publish.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.should_publish.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.should_publish.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chrismancini/between-us:v${{ steps.version.outputs.version }}
            ghcr.io/chrismancini/between-us:latest
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
